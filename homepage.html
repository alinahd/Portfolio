<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alinah Danish</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background-color: #ffffff;
    color: #0a0a0a;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

/* ================= HEADER ================= */

.header-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 32px 32px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 64px;
    border-bottom: 1px solid #e8e8e8;
    position: relative;
    z-index: 50;
}

.brand h1 {
    font-size: 17px;
    font-weight: 500;
}

.nav-group {
    display: flex;
    gap: 28px;
}

.nav-group a {
    font-size: 14px;
    text-decoration: none;
    color: #0a0a0a;
}

/* ================= HAMBURGER ================= */

.hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
}

.hamburger span {
    width: 24px;
    height: 2px;
    background: #0a0a0a;
}

/* ================= MOBILE MENU ================= */

.mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    right: -100%;
    width: 280px;
    height: 100vh;
    background: #fff;
    transition: right 0.4s ease;
    z-index: 200;

    /* 🔴 KEY FIX */
    pointer-events: none;
}

.mobile-menu.active {
    right: 0;
    pointer-events: auto;
}

.menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 150;

    /* 🔴 KEY FIX */
    pointer-events: none;
}

.menu-overlay.active {
    pointer-events: auto;
}

/* ================= HERO ================= */

.hero {
    max-width: 1400px;
    margin: 0 auto;
    padding: 96px 32px;
}

/* ================= WORK ================= */

.work-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 56px 32px 96px;

    /* 🔴 SAFETY */
    position: relative;
    z-index: 1;
}

.work-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 24px;
}

.project-card {
    text-decoration: none;
    color: inherit;
    display: block;
    -webkit-tap-highlight-color: transparent;
}

.image-container {
    height: 420px;
    background: #f7f7f7;
}

.project-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 968px) {
    .nav-group {
        display: none;
    }

    .hamburger {
        display: flex;
    }

    .mobile-menu,
    .menu-overlay {
        display: block;
    }

    .work-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 640px) {
    .work-grid {
        grid-template-columns: 1fr;
    }

    .image-container {
        height: 300px;
    }

    .mobile-menu {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="menu-overlay" id="menuOverlay"></div>

<header class="header-section">
    <div class="brand">
        <h1>Alinah Danish</h1>
    </div>

    <div class="nav-group">
        <a href="homepage.html">Work</a>
        <a href="archive.html">Archive</a>
        <a href="about.html">About</a>
    </div>

    <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </button>
</header>

<div class="mobile-menu" id="mobileMenu">
    <a href="homepage.html">Work</a>
    <a href="archive.html">Archive</a>
    <a href="about.html">About</a>
</div>

<section class="hero">
    <h2>I design digital experiences.</h2>
</section>

<section class="work-section">
    <div class="work-grid">
        <a href="ekko3.html" class="project-card">
            <div class="image-container">
                <img src="images/digitaluxmockup1.jpeg" alt="">
            </div>
        </a>
    </div>
</section>

<script>
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');
const menuOverlay = document.getElementById('menuOverlay');

function toggleMenu() {
    hamburger.classList.toggle('active');
    mobileMenu.classList.toggle('active');
    menuOverlay.classList.toggle('active');
    document.body.style.overflow =
        mobileMenu.classList.contains('active') ? 'hidden' : '';
}

hamburger.addEventListener('click', toggleMenu);
menuOverlay.addEventListener('click', toggleMenu);
</script>

</body>
</html>
